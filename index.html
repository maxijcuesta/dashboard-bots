<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e8e8ea;
      --muted: #6b6b75;
      --live:      #22c55e;
      --paper:     #3b82f6;
      --shadow:    #a855f7;
      --research:  #6b7280;
      --offline:   #4b5563;
      --error:     #ef4444;
      --live-bg:      #052814;
      --paper-bg:     #061730;
      --shadow-bg:    #160d24;
      --research-bg:  #111115;
      --offline-bg:   #111115;
      --error-bg:     #1f0a0a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    header {
      max-width: 1000px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.02em; }
    #last-updated { font-size: 0.78rem; color: var(--muted); margin-left: auto; }
    #refresh-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.25rem 0.7rem; border-radius: 6px; cursor: pointer; font-size: 0.78rem;
      transition: color 0.15s, border-color 0.15s;
    }
    #refresh-btn:hover { color: var(--text); border-color: var(--muted); }

    .section {
      max-width: 1000px;
      margin: 0 auto 2rem;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.85rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.3rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #44444d; }
    .card.offline { opacity: 0.55; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .card-title { font-size: 0.9rem; font-weight: 600; letter-spacing: -0.01em; }
    .card-desc  { font-size: 0.76rem; color: var(--muted); line-height: 1.45; }

    .badge {
      flex-shrink: 0;
      font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      padding: 0.2rem 0.5rem; border-radius: 999px; white-space: nowrap;
    }
    .badge-live     { background: var(--live-bg);     color: var(--live);     border: 1px solid #0e5228; }
    .badge-paper    { background: var(--paper-bg);    color: var(--paper);    border: 1px solid #0f2f5e; }
    .badge-shadow   { background: var(--shadow-bg);   color: var(--shadow);   border: 1px solid #2d1148; }
    .badge-research { background: var(--research-bg); color: var(--research); border: 1px solid #2a2a30; }
    .badge-offline  { background: var(--offline-bg);  color: var(--offline);  border: 1px solid #2a2a30; }
    .badge-error    { background: var(--error-bg);    color: var(--error);    border: 1px solid #5c1414; }

    .divider { height: 1px; background: var(--border); }

    .stats { display: flex; gap: 1.5rem; }
    .stat  { display: flex; flex-direction: column; gap: 0.15rem; }
    .stat-value {
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: -0.03em; line-height: 1;
    }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .win-positive { color: var(--live); }
    .win-neutral  { color: var(--muted); }

    .card-meta { font-size: 0.74rem; color: var(--muted); }
    .card-error {
      font-size: 0.74rem; color: var(--error);
      background: var(--error-bg); border: 1px solid #5c1414;
      border-radius: 6px; padding: 0.4rem 0.6rem; word-break: break-word;
    }

    .card-footer {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
    }
    .card-footer-row {
      display: flex;
      gap: 0.45rem;
      font-size: 0.73rem;
      line-height: 1.4;
    }
    .footer-key {
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .footer-val { color: var(--text); opacity: 0.8; }

    #error-banner {
      max-width: 1000px; margin: 0 auto 1.5rem;
      background: var(--error-bg); border: 1px solid #5c1414;
      color: var(--error); padding: 0.75rem 1rem;
      border-radius: 8px; font-size: 0.83rem; display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Bot Dashboard</h1>
  <span id="last-updated"></span>
  <button id="refresh-btn" onclick="loadData()">Refresh</button>
</header>

<div id="error-banner"></div>
<div id="content"></div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const SUPABASE_URL  = "https://psiyqqxjpnlnryrkgpbz.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzaXlxcXhqcG5sbnJ5cmtncGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzYzNDIsImV4cCI6MjA4OTAxMjM0Mn0.rhgavQDCOgAnnDUNj_oWC8WMXC4h8TLOJXYJmf0TnPQ";
  const REFRESH_MS    = 60_000;

  // ─── BOT REGISTRY ────────────────────────────────────────────────────────────
  // Todos los bots siempre visibles. Supabase enriquece status/stats cuando tiene datos.
  const ACTIVE_BOTS = [
    {
      id: "weatherbot",
      label: "Weatherbot",
      desc: "Shadow-trades mercados meteorológicos en Polymarket usando datos reales de forecast (Open-Meteo).",
      defaultStatus: "shadow",
      updated: "2026-03-27",
      nextUp: "Ampliar cobertura a mercados de lluvia y temperatura por región.",
    },
    {
      id: "botardobtc",
      label: "BotardoBTC",
      desc: "Estrategia maker-shadow cerrada el 25-mar. Actualmente inactivo — próxima iteración en diseño.",
      defaultStatus: "offline",
      updated: "2026-03-25",
      nextUp: "Diseñar nueva estrategia con señales de orderflow y re-deployar en EC2.",
    },
    {
      id: "botardobtc2",
      label: "BotardoBTC 2",
      desc: "Colector de datos y generador de señales BTC. Alimenta modelos de análisis.",
      defaultStatus: "shadow",
      updated: "2026-03-27",
      nextUp: "Agregar GitHub Actions para correr el collector automáticamente cada día.",
    },
    {
      id: "polymarket-paper-bot",
      label: "Polymarket Paper Bot",
      desc: "Paper-trading en Polymarket vía Cloudflare Workers (Python). Estrategia de mean-reversion.",
      defaultStatus: "paper",
      updated: "2026-03-27",
      nextUp: "Evaluar win rate tras primeras 50 operaciones y ajustar umbrales de entrada.",
    },
    {
      id: "botardosx3",
      label: "BotardosX3",
      desc: "Paper-trading en Polymarket vía Cloudflare Workers (TypeScript). Multi-estrategia con D1.",
      defaultStatus: "paper",
      updated: "2026-03-27",
      nextUp: "Integrar segunda estrategia en paralelo y comparar rendimiento.",
    },
    {
      id: "skeleton",
      label: "Skeleton",
      desc: "Bot base en desarrollo local. Plantilla para nuevas estrategias — aún no desplegado.",
      defaultStatus: "offline",
      updated: "2026-03-27",
      nextUp: "Subir a VPS y conectar al ciclo de reporte Supabase.",
    },
  ];

  const RESEARCH_BOTS = [
    {
      id: "btc5m-research",
      label: "BTC 5m Research",
      desc: "Señales de momentum en velas de 5 minutos de BTC. Evaluando edge antes de paper-trading.",
      updated: "2026-03-22",
      nextUp: "Completar backtest con datos de marzo y decidir si promueve a paper.",
    },
    {
      id: "btc-micro5m",
      label: "BTC Micro 5m",
      desc: "Variante scalp en micro-caps con BTC. Experimenta con umbrales de entrada más agresivos.",
      updated: "2026-03-22",
      nextUp: "Ajustar threshold de entrada y correr walk-forward sobre últimos 30 días.",
    },
    {
      id: "botardo-prism",
      label: "Botardo Prism",
      desc: "Ensemble overlay que combina múltiples señales. Fase de calibración de pesos.",
      updated: "2026-03-22",
      nextUp: "Calibrar pesos del ensemble con resultados de btc5m y btc-micro5m.",
    },
  ];

  // ─── FETCH ───────────────────────────────────────────────────────────────────
  async function sbFetch(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${SUPABASE_ANON}`,
        Accept: "application/json",
      },
    });
    if (!res.ok) throw new Error(`${res.status} — ${path}`);
    return res.json();
  }

  // ─── WIN RATE ────────────────────────────────────────────────────────────────
  function buildWinStats(rows) {
    const s = {};
    for (const r of rows) {
      if (!s[r.bot_id]) s[r.bot_id] = { wins: 0, closed: 0, open: 0 };
      const o = (r.outcome || "").toLowerCase();
      if (["win","loss","expired","resolved"].includes(o)) {
        s[r.bot_id].closed++;
        if (o === "win") s[r.bot_id].wins++;
      } else if (["open","shadow","paper"].includes(o)) {
        s[r.bot_id].open++;
      }
    }
    return s;
  }

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function timeAgo(iso) {
    if (!iso) return null;
    try {
      const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
      if (diff < 1)  return "just now";
      if (diff < 60) return `${diff}m ago`;
      const h = Math.floor(diff / 60);
      if (h < 24)   return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    } catch { return null; }
  }

  function badgeClass(status) {
    return {
      live: "badge-live", paper: "badge-paper",
      shadow: "badge-shadow", error: "badge-error",
    }[(status||"").toLowerCase()] ?? "badge-offline";
  }

  // ─── RENDER CARDS ────────────────────────────────────────────────────────────
  function renderActiveCard(bot, supaRow, ws) {
    const status   = supaRow?.status ?? bot.defaultStatus;
    const lastRun  = timeAgo(supaRow?.last_run_at);
    const hasData  = !!supaRow;
    const ws2      = ws[bot.id] || { wins: 0, closed: 0, open: 0 };
    const winRate  = ws2.closed > 0 ? Math.round(ws2.wins / ws2.closed * 100) : null;
    const winDisp  = winRate === null ? "—" : `${winRate}%`;
    const winClass = winRate !== null && winRate >= 50 ? "win-positive" : "win-neutral";
    const openPos  = supaRow?.meta?.openPositions ?? ws2.open;
    const offline  = !hasData ? " offline" : "";

    const statsBlock = hasData ? `
      <div class="stats">
        <div class="stat">
          <span class="stat-value ${winClass}">${winDisp}</span>
          <span class="stat-label">Win Rate</span>
        </div>
        <div class="stat">
          <span class="stat-value">${ws2.closed}</span>
          <span class="stat-label">Closed</span>
        </div>
        <div class="stat">
          <span class="stat-value">${openPos}</span>
          <span class="stat-label">Open</span>
        </div>
      </div>
      <div class="divider"></div>` : "";

    const metaBlock = lastRun
      ? `<div class="card-meta">Last run ${lastRun}</div>`
      : `<div class="card-meta" style="color:#4b5563">Sin datos aún — esperando primer heartbeat</div>`;

    const errBlock = status === "error" && supaRow?.last_error
      ? `<div class="card-error">${esc(supaRow.last_error)}</div>` : "";

    const footerBlock = (bot.updated || bot.nextUp) ? `
      <div class="card-footer">
        ${bot.updated ? `<div class="card-footer-row"><span class="footer-key">Actualizado</span><span class="footer-val">${esc(bot.updated)}</span></div>` : ""}
        ${bot.nextUp  ? `<div class="card-footer-row"><span class="footer-key">Próximo</span><span class="footer-val">${esc(bot.nextUp)}</span></div>` : ""}
      </div>` : "";

    return `
      <div class="card${offline}">
        <div class="card-top">
          <span class="card-title">${esc(bot.label)}</span>
          <span class="badge ${badgeClass(status)}">${esc(status)}</span>
        </div>
        <div class="card-desc">${esc(bot.desc)}</div>
        ${statsBlock}
        ${metaBlock}
        ${errBlock}
        ${footerBlock}
      </div>`;
  }

  function renderResearchCard(bot) {
    const footerBlock = (bot.updated || bot.nextUp) ? `
      <div class="card-footer">
        ${bot.updated ? `<div class="card-footer-row"><span class="footer-key">Actualizado</span><span class="footer-val">${esc(bot.updated)}</span></div>` : ""}
        ${bot.nextUp  ? `<div class="card-footer-row"><span class="footer-key">Próximo</span><span class="footer-val">${esc(bot.nextUp)}</span></div>` : ""}
      </div>` : "";
    return `
      <div class="card">
        <div class="card-top">
          <span class="card-title">${esc(bot.label)}</span>
          <span class="badge badge-research">Research</span>
        </div>
        <div class="card-desc">${esc(bot.desc)}</div>
        ${footerBlock}
      </div>`;
  }

  // ─── MAIN LOAD ───────────────────────────────────────────────────────────────
  async function loadData() {
    const content = document.getElementById("content");
    const banner  = document.getElementById("error-banner");
    const updEl   = document.getElementById("last-updated");
    banner.style.display = "none";

    let statusMap = {};
    let winStats  = {};

    try {
      const [statuses, trades] = await Promise.all([
        sbFetch("bot_status?select=*"),
        sbFetch("trade_log?select=bot_id,outcome"),
      ]);
      for (const row of statuses) statusMap[row.bot_id] = row;
      winStats = buildWinStats(trades);
      updEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      banner.textContent = `No se pudo conectar a Supabase: ${err.message}`;
      banner.style.display = "block";
      updEl.textContent = `Error ${new Date().toLocaleTimeString()}`;
    }

    const activeHtml = ACTIVE_BOTS
      .map(b => renderActiveCard(b, statusMap[b.id] ?? null, winStats))
      .join("");

    const researchHtml = RESEARCH_BOTS
      .map(b => renderResearchCard(b))
      .join("");

    content.innerHTML = `
      <div class="section">
        <div class="section-title">Bots activos</div>
        <div class="grid">${activeHtml}</div>
      </div>
      <div class="section">
        <div class="section-title">Experimentos / Research</div>
        <div class="grid">${researchHtml}</div>
      </div>`;
  }

  // ─── BOOT ────────────────────────────────────────────────────────────────────
  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
