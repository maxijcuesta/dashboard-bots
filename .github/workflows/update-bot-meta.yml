# Este workflow es llamado por cada bot repo para actualizar bots.json
# Se dispara vía workflow_dispatch con bot_id, updated y nextUp como inputs.

name: Update bot meta

on:
  workflow_dispatch:
    inputs:
      bot_id:
        required: true
        type: string
      updated:
        required: true
        type: string
      nextUp:
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update bots.json
        run: |
          python3 - <<'EOF'
          import json, os

          with open("bots.json") as f:
              data = json.load(f)

          bot_id  = os.environ["BOT_ID"]
          updated = os.environ["UPDATED"]
          next_up = os.environ["NEXT_UP"]

          if bot_id not in data:
              data[bot_id] = {}
          data[bot_id]["updated"] = updated
          data[bot_id]["nextUp"]  = next_up

          with open("bots.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Updated {bot_id}: {updated} — {next_up}")
          EOF
        env:
          BOT_ID:   ${{ inputs.bot_id }}
          UPDATED:  ${{ inputs.updated }}
          NEXT_UP:  ${{ inputs.nextUp }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bots.json
          git diff --cached --quiet || git commit -m "bot(${{ inputs.bot_id }}): update meta ${{ inputs.updated }}"
          git push
